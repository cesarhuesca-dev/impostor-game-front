
<div class="min-h-screen bg-linear-to-br from-slate-950 via-slate-900 to-purple-950 flex items-center justify-center p-6">

  <div class="w-full max-w-xl bg-slate-900/80 backdrop-blur border border-purple-500/20 rounded-3xl shadow-2xl p-8">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">

      <h2 class="text-3xl font-extrabold text-purple-400 tracking-wide">
        <span> ⚙️ </span><span>{{'settings.title' | translate}}</span>
      </h2>

      <button class="text-slate-400 hover:text-white transition text-2xl active:scale-90" (click)="closeSettings()">
        <span> ✕ </span>
      </button>

    </div>

    <form class="space-y-6">

      <!-- TEMA CLARO/OSCURO -->
       <!--TODO HAY QUE HACER EL TEMA OSCURO Y CLARO -->
      <!-- <div class="flex items-center justify-between bg-slate-800/70 p-4 rounded-xl border border-slate-700">
        <div>
          <p class="text-white font-medium"><span> ✨ </span><span>{{'settings.theme' | translate }}</span></p>
          <p class="text-sm text-slate-400">{{'settings.theme-description' | translate }}</p>
        </div>

        <input type="checkbox" class="w-5 h-5 accent-purple-500">
      </div> -->

      <!-- Idioma -->
      <div>

        <label class="text-purple-300 text-sm">
          <span> 🌍 </span><span>{{'settings.language' | translate }}</span>
        </label>

        <select class="custom-picker w-full mt-2 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500"
          [formField]="this.settingsForm.language">
          @for (lng of supportedLanguages(); track lng.code) {
            <option [value]="lng.code">{{lng.name | translate }}</option>
          }
        </select>


        <!-- <p-select class="w-full"
          optionLabel="name"
          optionValue="code"
          [field]="settingsForm.language"
          (onChange)="changeLanguage($event)">
          <ng-template #selectedItem let-selectedOption>
            @if (selectedOption) {
              <div>
                <span>{{ selectedOption.name | translate}}</span>
              </div>
            }
          </ng-template>
          <ng-template let-lng #item>
              <div>
                <span>{{ lng.name | translate }}</span>
              </div>
          </ng-template>
          <ng-template #dropdownicon>
              <i class="pi pi-language"></i>
          </ng-template>
        </p-select> -->

      </div>

      <!-- Botones -->
      <div class="grid grid-cols-2 gap-4 pt-4">

        <p-button class="form-btn btn-secondary" [disabled]="!this.settingsForm().dirty()"
          (click)="resetSettings()" >
          <span>{{'settings.reset' | translate }}</span>
        </p-button>

        <p-button class="form-btn" [disabled]="this.settingsForm().invalid()"
          (click)="saveSettings()">
          <span>{{'settings.save' | translate }}</span>
        </p-button>


      </div>

    </form>

  </div>

</div>
