

<div class="flex flex-col gap-2 text-shadow-lg/50 text-2xl italic font-bold text-white">
  @if (this.game()!.word!.category && this.game()!.word!.category!.length > 0 ) {
    <div>
      <span>{{ 'game.category' | translate }}: </span>
      <span>{{this.game()!.word.category}}</span>
    </div>
  }
  <div>
    <span>{{ 'game.word' | translate }}: </span>
    <span>{{this.game()!.word.word}}</span>
  </div>
</div>
