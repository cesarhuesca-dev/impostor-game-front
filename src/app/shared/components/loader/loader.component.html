<!-- @if (this.loading()) { -->
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm transition-all duration-400"
    [class.opacity-0]="!loading()"
    [class.opacity-100]="loading()"
    [class.pointer-events-none]="!loading()">

    <div class="flex flex-col items-center gap-6 transform transition-all duration-300"
      [class.scale-90]="!loading()"
      [class.scale-100]="loading()">

      <!-- Spinner -->
      <div class="relative w-16 h-16">
        <div class="absolute inset-0 rounded-full border-4 border-purple-500/20"></div>
        <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-purple-500 animate-spin"></div>
      </div>

      <!-- Texto -->
      <p class="text-purple-400 font-semibold tracking-wide animate-pulse">{{'loader.loading' | translate}}</p>

  </div>

</div>
<!-- } -->
