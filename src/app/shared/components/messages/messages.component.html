
<ng-template #toastTemplate let-message>
  <div class="p-toast-container">
    <div class="p-toast-message-container">
      <span>{{message.icon}}</span>
      <strong>{{ message.summary }}</strong>
    </div>
  </div>
</ng-template>

<p-toast position="top-left" key="top-left">
  <ng-template pTemplate="message" let-message>
    <ng-container *ngTemplateOutlet="toastTemplate; context: { $implicit: message }"/>
  </ng-template>
</p-toast>
<p-toast position="top-center" key="top-center">
  <ng-template pTemplate="message" let-message>
    <ng-container *ngTemplateOutlet="toastTemplate; context: { $implicit: message }"/>
  </ng-template>
</p-toast>

  <ng-template pTemplate="message" let-message>
    <ng-container *ngTemplateOutlet="toastTemplate; context: { $implicit: message }"/>
  </ng-template>
</p-toast>
<p-toast position="bottom-left" key="bottom-left">
  <ng-template pTemplate="message" let-message>
    <ng-container *ngTemplateOutlet="toastTemplate; context: { $implicit: message }"/>
  </ng-template>
</p-toast>
<p-toast position="bottom-center" key="bottom-center">
  <ng-template pTemplate="message" let-message>
    <ng-container *ngTemplateOutlet="toastTemplate; context: { $implicit: message }"/>
  </ng-template>
</p-toast>
<p-toast position="bottom-right" key="bottom-right">
  <ng-template pTemplate="message" let-message>
    <ng-container *ngTemplateOutlet="toastTemplate; context: { $implicit: message }"/>
  </ng-template>
</p-toast>
<p-toast position="center" key="center">
  <ng-template pTemplate="message" let-message>

</p-toast>
