<div class="fixed inset-0 flex items-center justify-center bg-black/70 backdrop-blur-sm transition-opacity duration-300"
  [class.opacity-0]="!isOpen()"
  [class.opacity-100]="isOpen()"
  [ngClass]="{'z-50': isOpen(), '-z-10' : !isOpen()}">

  <!-- Modal -->
  <div class="w-full max-w-md bg-slate-900 border border-purple-500/20 rounded-2xl shadow-2xl p-6 transform transition-all duration-300"
    [class.opacity-0]="!isOpen()"
    [class.opacity-100]="isOpen()"
    [class.scale-90]="!isOpen()"
    [class.scale-100]="isOpen()"
    [class.translate-y-4]="!isOpen()"
    [class.translate-y-0]="isOpen()">

    <!-- Header -->
    <h2 class="text-2xl font-bold text-purple-400 text-center mb-6">Crear jugador</h2>

    <form class="space-y-6">

      <!-- Avatar -->
      <div class="flex flex-col items-center gap-3">

        <div class="w-24 h-24 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center overflow-hidden">

          @if (previewImage) {
            <img [src]="previewImage" class="w-full h-full object-cover"/>
          }@else {
            <span class="text-slate-500 text-sm">Sin imagen</span>
          }
        </div>

        <!-- Input file -->
        <label class="cursor-pointer text-sm text-purple-400 hover:text-purple-300 transition">
          <span>Subir imagen</span>
          <input type="file" accept="image/*" (change)="onFileSelected($event)" class="hidden">
        </label>

      </div>

      <!-- Nombre -->
      <div>

        <label class="text-sm text-slate-400">Nombre</label>

        <input class="w-full mt-2 px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white focus:outline-none focus:ring-2 focus:ring-purple-500"
          type="text" [formField]="playerForm.name" placeholder="Tu nombre..." >

      </div>

      <!-- Botones -->
      <div class="flex gap-4 pt-4">

        <button class="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-xl transition"
          type="button"
          (click)="closeModal()">
          Cancelar
        </button>

        <button class="flex-1 bg-purple-600 hover:bg-purple-500 py-3 rounded-xl font-semibold shadow-lg shadow-purple-600/30 transition disabled:opacity-50"
          type="button"
          [disabled]="playerForm().invalid()"
          (click)="sendNewPlayer()">
          Continuar a
        </button>

      </div>

    </form>

  </div>

</div>
