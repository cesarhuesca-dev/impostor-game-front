@if ((started() || startedBanned()) && transition()) {
  <div class="fixed inset-0 z-999 flex items-center justify-center transition-opacity duration-300 bg-primary-blur backdrop-blur-md"
    [class.opacity-0]="!show()"
    [class.opacity-100]="show()">

    <div class="text-center max-w-xl w-full px-6 transform transition-all duration-500"
      [class.scale-90]="!show()"
      [class.scale-100]="show()">

      @if (started()) {
        <div class="text-6xl mb-4 animate-bounce">
          <span> 🎉 </span>
        </div>
        <h1 class="text-4xl md:text-5xl font-extrabold text-light mb-4">{{'game.closed'| translate}}</h1>
        <p class="text-light-secondary text-lg mb-8">{{'game.thanks-for-play'| translate}}</p>
      }

      @if (startedBanned()) {
        <div class="text-6xl mb-4 animate-bounce">
          <span> ☠️ </span>
        </div>
        <h1 class="text-4xl md:text-5xl font-extrabold text-light mb-4">{{'common.banned'| translate}}</h1>
        <p class="text-light-secondary text-lg mb-8">{{'common.ban-player-description'| translate}}</p>
      }



      <div class="flex items-center justify-center mt-2">
        <p-button class="form-btn w-2/4 "
        (click)="goHome()">
        <span>{{'common.back' | translate}}</span>
        </p-button>
      </div>

    </div>
  </div>
}
