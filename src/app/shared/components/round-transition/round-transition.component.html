@if (started()) {
  <div class="fixed inset-0 z-999 flex items-center justify-center transition-opacity duration-300 bg-primary-blur backdrop-blur-md"
    [class.opacity-0]="!show()"
    [class.opacity-100]="show()">

    <div class="text-center transform transition-all duration-500"
      [class.scale-90]="!show()"
      [class.scale-100]="show()">

      <!-- Texto -->
      <p class="text-lg mb-4 tracking-widest uppercase text-primary-light">{{'game.new-round' | translate }}</p>
      <!-- Número cuenta atrás -->
      <div class="text-8xl font-extrabold text-light drop-shadow-lg animate-pulse">{{ this.countdown() }}</div>
      <!-- Texto secundario -->
      <p class="text-light-secondary mt-4">{{'game.get-ready' | translate }}...</p>

      <div class="text-4xl mt-4">
        <span class="text-light">{{'game.player' | translate}} </span>
        <span class="text-primary-light">{{this.game().starterRoundPlayer}} </span>
        <span class="text-light lowercase">{{'game.start-round' | translate}}</span>
      </div>
    </div>
  </div>
}
